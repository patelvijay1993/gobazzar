<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — GoBazaar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a3a8f;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:40px 32px;max-width:360px;width:100%}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:24px}
a{display:inline-block;background:#e8a020;color:#fff;padding:12px 28px;border-radius:30px;font-weight:700;font-size:14px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now. Check your connection and try again.</p>
  <a onclick="window.location.reload()">Try Again</a>
</div>
</body>
</html>
